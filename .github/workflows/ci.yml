name: WealthPilot CI

on:

  push:

    branches:
      - master
      - main

  pull_request:

    branches:
      - master
      - main

jobs:

  test:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository

        uses: actions/checkout@v4

      - name: Setup Python

        uses: actions/setup-python@v5

        with:

          python-version: "3.12"

      - name: Install Dependencies

        run: |

          python -m pip install --upgrade pip

          pip install -r requirements.txt

      - name: Check FastAPI Imports

        run: |

          python -c "import app"

      - name: Run Unit Tests

        run: |

          pytest tests/